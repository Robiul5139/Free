<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Riyaz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:450px;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.profile{
text-align:center;
margin-bottom:20px;
}

.profile img{
width:110px;
height:110px;
border-radius:50%;
border:4px solid #E1306C;
object-fit:cover;
}

.profile h2{
margin-top:10px;
}

.profile p{
color:#666;
}

input,textarea{
width:100%;
padding:14px;
margin-top:12px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;
}

textarea{
height:120px;
resize:none;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#0095F6;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
}

#success{
display:none;
margin-top:15px;
text-align:center;
color:green;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<div class="profile">
<img src="https://via.placeholder.com/150" alt="Profile">
<h2>Riyaz Sk</h2>
<p>@fearless_lord_51</p>
</div>

<form id="contactForm">
<input type="text" id="name" placeholder="Your Name" required>
<input type="text" id="instagram" placeholder="Instagram Username">
<textarea id="message" placeholder="Write your message..." required></textarea>
<button type="submit">Send Message</button>
</form>

<div id="success">
✅ Message Sent Successfully!
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCVVFq8PsHSNMQsJPhWR1wCKkj9k0vAVJ4",
authDomain: "free-unlimited-follower.firebaseapp.com",
projectId: "free-unlimited-follower",
storageBucket: "free-unlimited-follower.firebasestorage.app",
messagingSenderId: "167164778451",
appId: "1:167164778451:web:53003a166773b617088126"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("contactForm").addEventListener("submit", async (e)=>{
e.preventDefault();

try{
await addDoc(collection(db,"messages"),{
name:document.getElementById("name").value,
instagram:document.getElementById("instagram").value,
message:document.getElementById("message").value,
createdAt:serverTimestamp()
});

document.getElementById("success").style.display="block";
e.target.reset();

}catch(err){
alert("Error: "+err.message);
}
});
</script>

</body>
</html>
